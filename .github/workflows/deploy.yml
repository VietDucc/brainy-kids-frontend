name: Deploy Frontend to Server

on:
  push:
    branches:
      - ci-cd-deploy-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/brainykid-frontend:latest .

      - name: 📤 Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/brainykid-frontend:latest

      - name: 🚀 Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/brainykid-frontend:latest
            docker stop brainykid-frontend || true && docker rm brainykid-frontend || true
            docker run -d --name brainykid-frontend -p 8083:8083 ${{ secrets.DOCKER_USERNAME }}/brainykid-frontend:latest
